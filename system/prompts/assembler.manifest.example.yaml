# Example prompt assembly manifest
#
# This file is documentation only. It does not change runtime behavior yet.
# It describes how a future prompt assembler can map platform source layers
# into engine-specific prompt outputs.

engine: openclaw
profile: default
version: 1

source_layers:
  - name: base_system
    layer: 1
    path: system/prompts/source/identity/base_system.md
    required: true

  - name: persona_default
    layer: 1
    path: system/prompts/source/identity/persona_default.md
    required: true

  - name: tool_policy_common
    layer: 4
    path: system/prompts/source/runtime/discipline_common.md
    required: true

  - name: soul_source
    layer: 3
    path: SOUL.md
    required: true

  - name: notebook_source
    layer: 3
    path: AGENTS.md
    required: false

  - name: environment_snapshot
    layer: 4
    path: system/prompts/source/runtime/environment_snapshot.md
    required: false

  - name: mcp_catalog
    layer: 4
    path: system/prompts/source/runtime/mcp_catalog.md
    required: false

  - name: skill_catalog
    layer: 4
    path: system/prompts/source/runtime/skill_catalog.md
    required: false

engine_outputs:
  - name: system_prompt
    target: engine-system
    components:
      - base_system
      - persona_default
      - tool_policy_common
      - environment_snapshot

  - name: soul_bootstrap
    target: bootstrap-file
    output_path: .engine/openclaw/SOUL.md
    components:
      - soul_source

  - name: notebook_bootstrap
    target: bootstrap-file
    output_path: .engine/openclaw/AGENTS.md
    components:
      - notebook_source

  - name: tools_prompt
    target: engine-private
    output_path: .engine/openclaw/TOOLS.md
    components:
      - tool_policy_common
      - mcp_catalog
      - skill_catalog

rules:
  preserve_prefix_layers:
    - 1
    - 2
    - 3
    - 4

  append_only_layers:
    - 5

  engine_switch:
    keep_source_layers: true
    rebuild_engine_outputs: true
    reuse_compiled_outputs: false

notes:
  - Source layers are platform assets and should remain engine-agnostic.
  - Engine outputs are rebuildable artifacts and must not be treated as the source of truth.
  - For non-compatible engines, including Rust rewrites, define a new assembler instead of patching another engine's compiled prompt outputs.
