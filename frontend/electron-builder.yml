appId: com.nagaagent.app
productName: Naga Agent
copyright: Copyright © 2024 娜迦博弈

directories:
  buildResources: build
  output: release

afterPack: scripts/after-pack.mjs

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/lodash.isequal/**/*
  - '!dist/models/重音テト/**'

# 音频/视频等二进制媒体文件从 asar 中解包到真实文件系统，
# 避免 HTMLAudioElement 通过自定义协议读取 asar 内文件失败
asarUnpack:
  - 'dist/voices/**/*'

extraResources:
  - from: build/icon.png
    to: build/icon.png
  - from: build/icon.ico
    to: build/icon.ico
  - from: premium-assets/backgrounds
    to: premium-assets/backgrounds
    filter:
      - '**/*'
      - '!.DS_Store'
  - from: ../characters
    to: characters
    filter:
      - '**/*'
      - '!.DS_Store'
  - from: backend-dist/naga-backend
    to: backend
    filter:
      - '**/*'
  - from: backend-dist/runtime
    to: runtime
    filter:
      - '**/*'
  - from: ../openclaw.LICENSE
    to: runtime/LICENSE

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  # 自签名代码签名证书（开发者：娜迦博弈）
  # electron-builder v26: cscLink + cscKeyPassword
  cscLink: build/codesign.pfx
  cscKeyPassword: NagaSign2024

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  unicode: true
  shortcutName: Naga Agent
  include: build/uninstaller.nsh

compression: normal

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icon.png
  identity: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Utility

publish:
  provider: generic
  url: http://62.234.131.204:30031/api/app/releases
  channel: latest
